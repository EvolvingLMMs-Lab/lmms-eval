dataset_path: nv-njb/EgoTextVQA-Indoor
task: egotextvqa
test_split: test
output_type: generate_until
doc_to_visual: !function utils.egotextvqa_doc_to_visual
doc_to_text: !function utils.egotextvqa_doc_to_text
doc_to_target: "correct_answer"
generation_kwargs:
  max_new_tokens: 512
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
process_results: !function utils.egotextvqa_process_results
metric_list:
  - metric: egotextvqa_accuracy
    aggregation: !function utils.egotextvqa_aggregate_accuracy
    higher_is_better: true
  - metric: egotextvqa_score
    aggregation: !function utils.egotextvqa_aggregate_score
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""
metadata:
  version: 0.1
