dataset_path: kcz358/OVOBench
dataset_name: realtime
task: "ovo_realtime"
test_split: test
output_type: generate_until
doc_to_text: !function utils.ovo_back_real_doc_to_text
doc_to_visual: !function utils.ovo_doc_to_visual
doc_to_target: "answer"
process_results: !function utils.ovo_back_real_process_results

generation_kwargs:
  max_new_tokens: 128
  temperature: 0
  do_sample: false

metric_list:
  - metric: back_real_acc
    aggregation: !function utils.ovo_back_real_acc
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    # Optional: path to a pre-extracted chunked videos directory.
    # If empty, chunks are auto-downloaded into $HF_HOME/ovobench.
    data_dir: null

metadata:
  version: 0.0