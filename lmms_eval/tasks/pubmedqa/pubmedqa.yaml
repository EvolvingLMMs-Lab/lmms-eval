dataset_path: openlifescienceai/pubmedqa

task: "pubmedqa"
test_split: test
doc_to_target: !function utils.pubmedqa_doc_to_target
doc_to_visual: null
doc_to_text: !function utils.pubmedqa_doc_to_text
doc_to_choice: !function utils.pubmedqa_doc_to_choice

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""

metric_list:
  - metric: accuracy
    aggregation: mean
    higher_is_better: true

process_results: !function utils.pubmedqa_process_results

metadata:
  version: 1.0
