dataset_path: parquet
dataset_kwargs:
  data_files: hf://datasets/kkv233/unig2u_dataset/auxsolidmath/auxsolidmath_test_easy_first100.parquet
task: "unig2u_auxsolidmath_easy"
test_split: train
output_type: generate_until

doc_to_visual: !function utils.auxsolidmath_doc_to_visual
doc_to_text: !function utils.auxsolidmath_doc_to_text
doc_to_target: !function utils.auxsolidmath_doc_to_target

process_results: !function utils.auxsolidmath_process_results

generation_kwargs:
  max_new_tokens: 16384
  do_sample: false
  temperature: 0.0

metric_list:
  - metric: auxsolidmath_text_acc
    aggregation: !function utils.auxsolidmath_aggregate
    higher_is_better: true

metadata:
  version: 1.0
  description: "AuxSolidMath Easy - Solid geometry problems with auxiliary line construction (Easy difficulty)"
