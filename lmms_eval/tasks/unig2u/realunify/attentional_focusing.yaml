# RealUnify Attentional Focusing Task
dataset_path: parquet
dataset_kwargs:
  data_files: hf://datasets/kkv233/unig2u_dataset/realunify/realunify_attentional_focusing.parquet
task: "unig2u_realunify_attentional_focusing"
test_split: train
output_type: generate_until

doc_to_visual: !function utils.realunify_doc_to_visual
doc_to_text: !function utils.realunify_doc_to_text
doc_to_target: "answer"

process_results: !function utils.realunify_process_results

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""

generation_kwargs:
  max_new_tokens: 1024
  temperature: 0
  do_sample: false

metric_list:
  - metric: attentional_focusing
    aggregation: !function utils.realunify_aggregate_results
    higher_is_better: true

metadata:
  version: 1.0
  num_samples: 100
