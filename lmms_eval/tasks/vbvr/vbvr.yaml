include: _default_template_yaml
task: vbvr

metric_list:
  - metric: vbvr_overall
    aggregation: !function utils.vbvr_aggregate_overall
    higher_is_better: true
  - metric: vbvr_in_domain
    aggregation: !function utils.vbvr_aggregate_in_domain
    higher_is_better: true
  - metric: vbvr_out_of_domain
    aggregation: !function utils.vbvr_aggregate_out_of_domain
    higher_is_better: true
  - metric: vbvr_abstraction
    aggregation: !function utils.vbvr_aggregate_abstraction
    higher_is_better: true
  - metric: vbvr_knowledge
    aggregation: !function utils.vbvr_aggregate_knowledge
    higher_is_better: true
  - metric: vbvr_perception
    aggregation: !function utils.vbvr_aggregate_perception
    higher_is_better: true
  - metric: vbvr_spatiality
    aggregation: !function utils.vbvr_aggregate_spatiality
    higher_is_better: true
  - metric: vbvr_transformation
    aggregation: !function utils.vbvr_aggregate_transformation
    higher_is_better: true
  - metric: submission
    aggregation: !function utils.vbvr_aggregate_submission
    higher_is_better: true

metadata:
  - version: 0.1
    description: "VBVR-Bench: Image-to-Video reasoning benchmark (100 tasks, 500 samples) with rule-based per-task scoring."
