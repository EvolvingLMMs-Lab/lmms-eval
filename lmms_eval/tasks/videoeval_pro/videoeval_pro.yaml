dataset_path: TIGER-Lab/VideoEval-Pro
dataset_kwargs:
  token: True
  cache_dir: videoevalpro
  video: True
generation_kwargs:
  max_new_tokens: 16
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
task: videoeval_pro
test_split: test
output_type: generate_until
doc_to_visual: !function utils.videoeval_pro_doc_to_visual
doc_to_text: !function utils.videoeval_pro_doc_to_text
doc_to_target: "answer"
process_results: !function utils.videoeval_pro_process_results
metric_list:
  - metric: videoeval_pro_score
    aggregation: !function utils.videoeval_pro_aggregate_results
    higher_is_better: true
metadata:
  - version: 0.0
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer with the option's letter from the given choices directly."
  gpt4v:
    pre_prompt: ""
    post_prompt: "\nAnswer the question with the correct option letter."
  llava_vid:
    pre_prompt: ""
    post_prompt: "\nThe best answer is:"
