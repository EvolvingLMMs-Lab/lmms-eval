dataset_path: lmms-lab/Video-MME
dataset_kwargs:
  token: True
  cache_dir: videomme
  video: True
task: videomme_short_interleaved_subtitle
test_split: test
output_type: generate_until
doc_to_visual: !function utils.videomme_doc_to_visual
doc_to_text: ""
doc_to_messages: !function utils.videomme_doc_to_messages_interleaved_subtitle
doc_to_target: "answer"
process_docs: !function utils.videomme_process_docs_short
generation_kwargs:
  max_new_tokens: 16
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
process_results: !function utils.videomme_process_results
metric_list:
  - metric: videomme_perception_score
    aggregation: !function utils.videomme_aggregate_results
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    post_prompt: "The best answer is:"
metadata:
  - version: 0.0
