dataset_path: MME-Benchmarks/Video-MME-v2
dataset_kwargs:
  token: True
  cache_dir: videommev2
  video: True
task: videommev2
test_split: test
output_type: generate_until
doc_to_visual: !function utils.videommev2_doc_to_visual
doc_to_text: !function utils.videommev2_doc_to_text
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 16
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
process_results: !function utils.videommev2_process_results
metric_list:
  - metric: videommev2_score
    aggregation: !function utils.videommev2_aggregate_results
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""
metadata:
  - version: 0.0
