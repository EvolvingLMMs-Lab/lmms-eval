dataset_path: nyu-visionx/vstat
class: !function utils.VSTATTask
task: vstat
test_split: test
output_type: generate_until
doc_to_visual: !function utils.vstat_doc_to_visual
doc_to_text: !function utils.vstat_doc_to_text
doc_to_target: !function utils.vstat_doc_to_target
process_docs: !function utils.vstat_process_docs
process_results: !function utils.vstat_process_results
metric_list:
  - metric: Numeric_MRA
    aggregation: !function utils.vstat_aggregate_mean
    higher_is_better: true
  - metric: MCQ_ACC
    aggregation: !function utils.vstat_aggregate_mean
    higher_is_better: true
  - metric: ALL_Score_avg
    aggregation: !function utils.vstat_aggregate_mean
    higher_is_better: true
generation_kwargs:
  max_new_tokens: 64
  temperature: 0
  do_sample: false
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    mcq_post_prompt: "Answer with only the option letter."
    numeric_post_prompt: "Answer with only a single number."
dataset_kwargs:
  cache_dir: vstat
  video: true
  qa_filename: vstat_qa_clean.json
  youtube_workers: 2
  # Set VSTAT_DOWNLOAD_YOUTUBE=1, or change this to true in a local config, to
  # prepare non-redistributed YouTube clips during task setup.
  download_youtube: false
metadata:
  version: 0.0
  hf_dataset: nyu-visionx/vstat
  cache_dir: vstat
  youtube_download_env: VSTAT_DOWNLOAD_YOUTUBE
  video_root_env: VSTAT_VIDEO_ROOT
  qa_path_env: VSTAT_QA_PATH
